<script>
// ============ 渲染引擎：读 INTEL_DATA 动态生成页面 ============
(function(){
  const D = window.INTEL_DATA || {cards:[],channels:[],sources:{ok:[],missed:""}};
  const esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const impLabel = {hi:"停下精读", mid:"值得关注", lo:"速览"};

  // 顶部日期
  document.getElementById('metaLine').textContent = (D.date? D.date+" · " : "") + (D.tagline||"为留存而读，不为刷新而读");

  // X 过期提示
  if(D.xStale) document.getElementById('staleBar').style.display = 'block';

  // 频道定义查表（用于卡片上的领域小标签）
  const chMap = {};
  D.channels.forEach(ch=>{ chMap[ch.key]=ch; });

  // ---- 主排序：重要性优先（hi>mid>lo），同档内按日期新→旧 ----
  // total / 频道计数都只统计「今日」卡片，回顾(flashback)卡不计入。
  const total = D.cards.filter(c=>!c.flashback).length;
  const impRank = {hi:0, mid:1, lo:2};
  // 从 src / who 里提取 "MM-DD" 做日期排序键；无日期的排在同档末尾
  function dateKey(c){
    const s = (c.who||c.src||"");
    const m = s.match(/(\d{1,2})-(\d{1,2})/);
    if(!m) return -1;                       // 无日期：最旧
    return parseInt(m[1],10)*100 + parseInt(m[2],10);
  }
  const ordered = D.cards.map((c,i)=>({c,i})).sort((a,b)=>{
    const ra=impRank[a.c.imp]??1, rb=impRank[b.c.imp]??1;
    if(ra!==rb) return ra-rb;               // 1) 重要性档：hi>mid>lo
    // 2) 「今日头条」手动置顶：rank 越小越靠前（没填 rank 的视为很大）
    const ka = (a.c.rank==null?9999:a.c.rank), kb=(b.c.rank==null?9999:b.c.rank);
    if(ka!==kb) return ka-kb;
    const da=dateKey(a.c), db=dateKey(b.c);
    if(da!==db) return db-da;               // 3) 日期新→旧
    return a.i-b.i;                          // 4) 原始顺序兜底（稳定）
  }).map(x=>x.c);

  // 频道计数（过滤条仍按频道，保留领域检索入口）
  const byCat = {};
  D.cards.forEach(c=>{ if(!c.flashback) (byCat[c.cat] = byCat[c.cat]||[]).push(c); });
  const activeChannels = D.channels.filter(ch => (byCat[ch.key]||[]).length>0);

  // 重要性分档计数（用于分档分隔线）
  const impLabelMap = {hi:"停下精读", mid:"值得关注", lo:"速览快讯"};
  const impDescMap  = {hi:"今天最该花时间的几条", mid:"扫到再决定要不要展开", lo:"知道有这回事即可"};
  const impColorMap = {hi:"#c2452f", mid:"#c98a1e", lo:"#5f8a3a"};

  // ---- 过滤条 ----
  const filters = document.getElementById('filters');
  let fhtml = `<button class="f on" data-f="all">全部 <span class="num">${total}</span></button>`;
  activeChannels.forEach(ch=>{
    fhtml += `<button class="f" data-f="${ch.key}"><span class="dotmini" style="background:${ch.color}"></span>${esc(ch.name)} <span class="num">${byCat[ch.key].length}</span></button>`;
  });
  fhtml += `<button class="f" data-f="kept">★ 已收藏</button>`;
  filters.innerHTML = fhtml;

  // ---- 卡片渲染 ----
  function cardHtml(c){
    const imp = c.imp||"mid";
    const ch = chMap[c.cat] || {name:"", color:"#a8a294"};
    // 领域小标签：色点 + 频道名，放在重要性徽标右边，让一眼知道这条属于哪个领域
    const chTag = `<span class="chtag"><span class="cdot" style="background:${ch.color}"></span>${esc(ch.name)}</span>`;
    // 来源行：X 卡片用 handle 样式，网页源用 .src
    let metaRow;
    if(c.handle){
      metaRow = `<span class="xhandle">${esc(c.handle)}</span><span class="xwho">${esc(c.who||"")}</span>`;
    }else{
      metaRow = `<span class="src">${esc(c.src||"")}</span>`;
    }
    return `<article class="card ${imp}${c.flashback?' isFlashback':''}" data-cat="${c.cat}" data-flashback="${c.flashback?1:0}">
      <div class="c-row1"><span class="imp ${imp}">${impLabel[imp]||"值得关注"}</span>${chTag}${metaRow}</div>
      <div class="c-title">${esc(c.title)}</div>
      <div class="c-sum">${esc(c.sum)}</div>
      <div class="c-ta"><span class="lab">TA 视角</span><span class="txt">${esc(c.ta)}</span></div>
      <div class="c-foot"><button class="keep"><span class="ic"></span>收藏入复习</button><a class="link" href="${esc(c.url||'#')}" target="_blank">原文 ↗</a></div>
    </article>`;
  }

  const stream = document.getElementById('stream');
  let html = "";

  // 今日一句
  if(D.todayHtml){
    html += `<div class="daysum" data-cat="sum"><div class="k">今日一句</div><p>${D.todayHtml}</p></div>`;
  }

  // 按重要性分档渲染（默认视图）：hi → mid → lo，每档一条分隔线，档内已按日期新→旧
  // 回顾卡片(flashback)不参与三档，单独成栏放最后。
  ["hi","mid","lo"].forEach(level=>{
    const list = ordered.filter(c=>!c.flashback && (c.imp||"mid")===level);
    if(!list.length) return;
    html += `<div class="secline" data-imp="${level}"><span class="dot" style="background:${impColorMap[level]}"></span><span class="lbl">${impLabelMap[level]}</span><span class="cnt">${list.length} 条 · ${impDescMap[level]}</span><span class="ln"></span></div>`;
    list.forEach(c=> html += cardHtml(c));
  });

  // 回顾栏：今日新增少时，run.py 会补几条「前几天最爆的」并打 flashback 标记
  const fbList = ordered.filter(c=>c.flashback);
  if(fbList.length){
    const fbTitle = D.flashbackTitle || "来回顾下前几天的";
    html += `<div class="secline flashback" data-imp="flashback"><span class="dot" style="background:#9a6cff"></span><span class="lbl">${esc(fbTitle)}</span><span class="cnt">${fbList.length} 条 · 趁手感还在，复习一遍</span><span class="ln"></span></div>`;
    fbList.forEach(c=> html += cardHtml(c));
  }

  // 信息源说明
  if(D.sources){
    const ok = (D.sources.ok||[]).map(esc).join(" · ");
    html += `<div class="srcbar"><div class="srcbox"><b>本期信息源（${(D.sources.ok||[]).length} 个抓取成功）：</b>${ok}`;
    if(D.sources.missed) html += `<br><span class="miss">未覆盖：${esc(D.sources.missed)}</span>`;
    html += `</div></div>`;
  }

  html += `<div class="end">今日 ${total} 条 · 按重要性排序，最该停下的在最前；卡片上的色点标注所属领域<br>内容均来自原媒体，本站仅作摘要整理与回链</div>`;
  stream.innerHTML = html;

  // ============ 交互：过滤 / 收藏 / 复习抽屉（与原版逻辑一致） ============
  const cards = ()=>[...document.querySelectorAll('.card')];
  const seclines = ()=>[...document.querySelectorAll('.secline')];
  const srcbar = document.querySelector('.srcbar');
  const daysum = document.querySelector('.daysum');

  filters.addEventListener('click',e=>{
    const b=e.target.closest('.f'); if(!b)return;
    [...filters.children].forEach(x=>x.classList.toggle('on',x===b));
    const f=b.dataset.f;
    cards().forEach(c=>{
      const isFb = c.dataset.flashback==='1';
      let show;
      if(isFb){
        // 回顾卡只在「全部」和「已收藏(且已收藏)」视图露出，不混进具体频道筛选
        show = f==='all' ? true : f==='kept' ? c.classList.contains('isKept') : false;
      }else{
        show = f==='all' ? true : f==='kept' ? c.classList.contains('isKept') : c.dataset.cat===f;
      }
      c.style.display = show ? '' : 'none';
    });
    // 分隔线是「重要性分档」：只在「全部」视图显示；点频道/已收藏时隐藏，卡片连续平铺
    seclines().forEach(s=>{ s.style.display = (f==='all') ? 'flex' : 'none'; });
    if(daysum) daysum.style.display = (f==='all')?'block':'none';
    if(srcbar) srcbar.style.display = (f==='all')?'block':'none';
  });

  const rvList=document.getElementById('rvList'), rvEmpty=document.getElementById('rvEmpty'), rvCount=document.getElementById('rvCount');
  let kept=0;
  document.querySelectorAll('.keep').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const card=btn.closest('.card');
      const on=btn.classList.toggle('kept');
      card.classList.toggle('isKept',on);
      btn.lastChild.textContent = on? ' 已在复习队列' : '收藏入复习';
      if(on){
        kept++;
        const t=card.querySelector('.c-title').textContent;
        const div=document.createElement('div');
        div.className='rv-item'; div.dataset.title=t;
        div.innerHTML='<div class="t">'+t+'</div><div class="when">● 下次回看：明天</div>';
        rvList.appendChild(div);
      }else{
        kept--;
        const t=card.querySelector('.c-title').textContent;
        const it=[...rvList.querySelectorAll('.rv-item')].find(x=>x.dataset.title===t);
        if(it) it.remove();
      }
      rvCount.textContent=kept;
      rvEmpty.style.display = kept? 'none':'block';
    });
  });

  const review=document.getElementById('review'), mask=document.getElementById('mask');
  const open=()=>{review.classList.add('open');mask.classList.add('on')};
  const close=()=>{review.classList.remove('open');mask.classList.remove('on')};
  document.getElementById('openRv').onclick=open;
  document.getElementById('closeRv').onclick=close;
  mask.onclick=close;
})();
</script>
